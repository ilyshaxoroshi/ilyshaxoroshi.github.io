<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix IP Grabbed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        /* Canvas на заднем плане */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* Контейнер с сообщением — поверх матрицы */
        .message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 2rem 3rem;
            border-radius: 8px;
            border: 2px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        .message-container span {
            font-size: 3rem;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #0f0; }
            50% { box-shadow: 0 0 50px #0f0; }
            100% { box-shadow: 0 0 20px #0f0; }
        }

        @media (max-width: 600px) {
            .message-container span {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .message-container {
                padding: 1.5rem;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="message-container">
        <span>your ip has been grabbed</span>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Устанавливаем размер canvas равным размеру окна
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Настройки матрицы
            const fontSize = 20; // Размер символов
            const columns = Math.floor(canvas.width / fontSize); // Количество колонок
            
            // Массив для хранения Y-позиций каждой колонки
            let drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * -canvas.height / fontSize); // Случайные стартовые позиции
            }

            // Символы для матрицы (ASCII + японские символы для атмосферы)
            const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+{}[]:;<>,.?/";

            // Функция рисования матричного дождя
            function drawMatrix() {
                // Полупрозрачный черный фон для эффекта затухания
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Устанавливаем стиль для символов
                ctx.font = fontSize + 'px monospace';
                
                // Проходим по каждой колонке
                for (let i = 0; i < drops.length; i++) {
                    // Случайный символ
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    
                    // Случайный оттенок зеленого
                    const green = Math.floor(150 + Math.random() * 100);
                    ctx.fillStyle = `rgb(0, ${green}, 0)`;
                    
                    // Рисуем символ
                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                    
                    // Сбрасываем колонку, если символ ушел за нижний край
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    
                    // Перемещаем каплю вниз
                    drops[i]++;
                }
            }

            // Запускаем анимацию
            setInterval(drawMatrix, 50);

            // Маленький трюк с заголовком
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    document.title = "⚠️ IP GRABBED ⚠️";
                } else {
                    document.title = "Matrix IP Grabbed";
                }
            });
        })();
    </script>
</body>
</html>
